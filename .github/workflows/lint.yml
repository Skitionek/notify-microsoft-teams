name: Lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Default to read-only; individual jobs grant only the permissions they need.
permissions: read-all

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit auto-fixes and push dist/
      issues: write
      pull-requests: write
      security-events: write # needed to upload SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          # Check out the actual branch (not the detached merge commit) so
          # we can push commits back to the PR branch.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Detect MegaLinter flavor
        id: detect_flavor
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || true)
          fi
          echo "Changed files:"
          echo "${CHANGED:-<none>}"
          LANGS=()
          if [[ -n "$CHANGED" ]]; then
            grep -qiE '\.(py|ipynb|pyx|pyi)$'                <<< "$CHANGED" && LANGS+=(python)
            grep -qiE '\.(js|ts|jsx|tsx|mjs|cjs|vue|svelte)$' <<< "$CHANGED" && LANGS+=(javascript)
            grep -qiE '\.java$'                                <<< "$CHANGED" && LANGS+=(java)
            grep -qiE '\.go$'                                  <<< "$CHANGED" && LANGS+=(go)
            grep -qiE '\.rb$'                                  <<< "$CHANGED" && LANGS+=(ruby)
            grep -qiE '\.php$'                                 <<< "$CHANGED" && LANGS+=(php)
            grep -qiE '\.rs$'                                  <<< "$CHANGED" && LANGS+=(rust)
            grep -qiE '\.(cs|vb|fs|fsx)$'                     <<< "$CHANGED" && LANGS+=(dotnet)
            grep -qiE '\.(tf|tfvars)$'                         <<< "$CHANGED" && LANGS+=(terraform)
            grep -qiE '\.swift$'                               <<< "$CHANGED" && LANGS+=(swift)
          fi
          if [[ ${#LANGS[@]} -eq 1 ]]; then
            FLAVOR="${LANGS[0]}"
            IMAGE="docker://ghcr.io/oxsecurity/megalinter-${FLAVOR}:v9.4.0"
          else
            FLAVOR="all"
            IMAGE="docker://ghcr.io/oxsecurity/megalinter:v9.4.0"
          fi
          echo "Detected flavor: $FLAVOR (matched languages: ${LANGS[*]:-none})"
          echo "flavor=$FLAVOR" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"   >> "$GITHUB_OUTPUT"

      # Build a minimal Docker action on the fly pointing at the single
      # flavor image determined above. Only that one image will be pulled.
      - name: Create dynamic MegaLinter action
        run: |
          mkdir -p .github/actions/_megalinter
          printf 'name: MegaLinter (%s)\ndescription: Run MegaLinter\nruns:\n  using: docker\n  image: "%s"\n' \
            "${{ steps.detect_flavor.outputs.flavor }}" \
            "${{ steps.detect_flavor.outputs.image }}" \
            > .github/actions/_megalinter/action.yml
          echo "Generated action.yml:"
          cat .github/actions/_megalinter/action.yml

      - name: Run MegaLinter
        id: ml_run
        uses: ./.github/actions/_megalinter
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMENT_REPORTER: false
          SARIF_REPORTER: true
          APPLY_FIXES: all
          # Force eslint v8 (used by MegaLinter) to use legacy .eslintrc config
          # mode so the --no-eslintrc flag it passes remains valid. Local dev
          # with eslint v9 continues to use eslint.config.mjs (flat config).
          ESLINT_USE_FLAT_CONFIG: "false"

      # Remove the ephemeral action before any commit steps so it is never
      # committed to the repository.
      - name: Clean up dynamic action
        if: always()
        run: rm -rf .github/actions/_megalinter

      # ── Auto-rebuild dist/ ─────────────────────────────────────────────────
      # Rebuild dist/index.js after MegaLinter's auto-fixes so the compiled
      # artifact stays in sync with any linter-corrected source changes.
      - name: Set up Node.js
        if: success() || failure()
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Rebuild dist/ if source changed
        if: success() || failure()
        run: |
          npm ci
          npm run package

      # Derive has_updated_sources from git status after both linter fixes
      # and the potential rebuild above.
      - name: Collect all changes
        if: success() || failure()
        id: ml
        run: |
          if git diff --quiet; then
            echo "has_updated_sources=0" >> "$GITHUB_OUTPUT"
          else
            echo "has_updated_sources=1" >> "$GITHUB_OUTPUT"
          fi

      # ── Auto-commit fixes to PR branch ────────────────────────────────────
      # Commit linter auto-fixes and any rebuilt dist/ directly back to the
      # PR branch. Avoids the extra PR-within-a-PR indirection and does not
      # require a PAT — GITHUB_TOKEN with contents: write is sufficient.
      - name: Commit and push auto-fixes
        if: >
          (success() || failure()) &&
          steps.ml.outputs.has_updated_sources == '1' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          # Guard against infinite loop: skip if this is itself an auto-fix commit.
          if git log -1 --format=%s | grep -qF '[MegaLinter]'; then
            echo "Last commit was already an auto-fix — skipping to prevent loop."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "[MegaLinter] Apply linters automatic fixes and rebuild dist/"
          git push
          echo "Auto-fixes committed and pushed. A new CI run will validate the result."

      # ── Upload SARIF for PR annotations ───────────────────────────────────
      - name: Upload SARIF report
        if: >
          (github.event_name == 'pull_request' || github.event_name == 'push') &&
          always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v3
        continue-on-error: true
        with:
          sarif_file: megalinter-reports/megalinter-report.sarif
          category: megalinter
