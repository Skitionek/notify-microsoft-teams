---
# MegaLinter configuration
# https://megalinter.io/latest/config-file/

# ── Global exclusions ─────────────────────────────────────────────────────────
# Skip generated/vendored directories globally so linters don't flag bundled code.
FILTER_REGEX_EXCLUDE: "(dist/|node_modules/)"

# ── Per-linter tweaks ─────────────────────────────────────────────────────────

# jscpd: test files share similar setup/teardown patterns which creates
# intentional "duplication". Downgrade to non-blocking.
COPYPASTE_JSCPD_DISABLE_ERRORS: true

# lychee: URL checker; private npm registry (npm.pkg.github.com) returns 404
# for public requests and social sites (patreon.com) return 403. These are
# false positives so we downgrade to non-blocking.
SPELL_LYCHEE_DISABLE_ERRORS: true

# trivy: vulnerability scanner; remaining vulnerabilities are in transitive
# devDependencies with no available fix. Downgrade to non-blocking.
REPOSITORY_TRIVY_DISABLE_ERRORS: true

# kics: IaC security scan; downgrade to non-blocking until findings can be
# evaluated individually.
REPOSITORY_KICS_DISABLE_ERRORS: true
